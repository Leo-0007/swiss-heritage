<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Webhook n8n - Swiss Heritage</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h1 {
      color: #1a202c;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #718096;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #2d3748;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .result {
      margin-top: 25px;
      padding: 20px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    .result.success {
      background: #d1fae5;
      border: 2px solid #6ee7b7;
      color: #065f46;
      display: block;
    }

    .result.error {
      background: #fee2e2;
      border: 2px solid #fca5a5;
      color: #991b1b;
      display: block;
    }

    .result h3 {
      margin-bottom: 10px;
      font-size: 16px;
    }

    pre {
      background: rgba(0,0,0,0.05);
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin-top: 10px;
      font-size: 12px;
    }

    .info {
      background: #e0e7ff;
      border-left: 4px solid #667eea;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 25px;
      font-size: 13px;
      color: #3730a3;
    }

    .webhook-url {
      background: #f7fafc;
      padding: 12px;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      word-break: break-all;
      margin-top: 8px;
      border: 1px solid #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Test Webhook n8n</h1>
    <p class="subtitle">Testez votre workflow Swiss Heritage LPP</p>

    <div class="info">
      <strong>ℹ️ Information</strong><br>
      Ce formulaire envoie des données de test à votre webhook n8n.
      <div class="webhook-url">https://n8n.swiss-leads.ch/webhook-test/lpp-form</div>
    </div>

    <form id="testForm">
      <div class="form-group">
        <label for="name">Nom complet</label>
        <input
          type="text"
          id="name"
          value="Jean Test"
          required
        >
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          value="test@example.com"
          required
        >
      </div>

      <div class="form-group">
        <label for="phone">Téléphone</label>
        <input
          type="tel"
          id="phone"
          value="+41 79 123 45 67"
          required
        >
      </div>

      <button type="submit" id="submitBtn">
        🚀 Envoyer le test
      </button>
    </form>

    <div id="result" class="result">
      <h3 id="resultTitle"></h3>
      <div id="resultMessage"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById('testForm');
    const submitBtn = document.getElementById('submitBtn');
    const result = document.getElementById('result');
    const resultTitle = document.getElementById('resultTitle');
    const resultMessage = document.getElementById('resultMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Récupération des données
      const formData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        timestamp: new Date().toISOString(),
        source: 'test-webhook-html'
      };

      // UI Loading
      submitBtn.disabled = true;
      submitBtn.textContent = '⏳ Envoi en cours...';
      result.style.display = 'none';

      try {
        // Envoi au webhook
        const response = await fetch('https://n8n.swiss-leads.ch/webhook-test/lpp-form', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(formData)
        });

        const data = await response.json();

        // Affichage du résultat
        if (response.ok && data.success) {
          result.className = 'result success';
          resultTitle.textContent = '✅ Succès !';
          resultMessage.innerHTML = `
            <p><strong>Message :</strong> ${data.message || 'Données envoyées avec succès'}</p>
            ${data.lead_id ? `<p><strong>Lead ID :</strong> ${data.lead_id}</p>` : ''}
            <details style="margin-top: 10px;">
              <summary style="cursor: pointer; font-weight: 600;">Voir la réponse complète</summary>
              <pre>${JSON.stringify(data, null, 2)}</pre>
            </details>
          `;
        } else {
          throw new Error(data.message || 'Erreur inconnue');
        }

      } catch (error) {
        result.className = 'result error';
        resultTitle.textContent = '❌ Erreur';
        resultMessage.innerHTML = `
          <p><strong>Message :</strong> ${error.message}</p>
          <p style="margin-top: 10px;"><strong>Vérifications :</strong></p>
          <ul style="margin-left: 20px; margin-top: 5px;">
            <li>Le workflow n8n est-il actif ?</li>
            <li>L'URL du webhook est-elle correcte ?</li>
            <li>Vérifiez les logs dans n8n</li>
          </ul>
          <details style="margin-top: 10px;">
            <summary style="cursor: pointer; font-weight: 600;">Données envoyées</summary>
            <pre>${JSON.stringify(formData, null, 2)}</pre>
          </details>
        `;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '🚀 Envoyer le test';
        result.style.display = 'block';
      }
    });
  </script>
</body>
</html>
