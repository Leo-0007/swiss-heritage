  <style>
    * {

    /* 3D Animations */
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotateX(2deg) rotateY(-2deg); }
      50% { transform: translateY(-20px) rotateX(-2deg) rotateY(2deg); }
    }

    @keyframes floatSlow {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      33% { transform: translateY(-15px) rotate(1deg); }
      66% { transform: translateY(-8px) rotate(-1deg); }
    }

    @keyframes pulse3d {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(201, 169, 98, 0.4); }
      50% { transform: scale(1.05); box-shadow: 0 0 30px 10px rgba(201, 169, 98, 0.15); }
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-40px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeInRight {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes rotateIn {
      from { opacity: 0; transform: perspective(600px) rotateY(-15deg); }
      to { opacity: 1; transform: perspective(600px) rotateY(0deg); }
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes orbFloat1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(50px, -30px) scale(1.1); }
      50% { transform: translate(-20px, -60px) scale(0.9); }
      75% { transform: translate(-40px, -20px) scale(1.05); }
    }

    @keyframes orbFloat2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(-40px, 20px) scale(0.95); }
      50% { transform: translate(30px, 40px) scale(1.1); }
      75% { transform: translate(50px, -10px) scale(1); }
    }

    @keyframes countUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes borderGlow {
      0%, 100% { border-color: rgba(201, 169, 98, 0.3); }
      50% { border-color: rgba(201, 169, 98, 0.6); }
    }

    @keyframes spin3d {
      from { transform: perspective(800px) rotateY(0deg); }
      to { transform: perspective(800px) rotateY(360deg); }
    }

    @keyframes particleFloat {
      0%, 100% { opacity: 0; transform: translateY(0) scale(0); }
      10% { opacity: 1; transform: scale(1); }
      90% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-100vh) scale(0.5); }
    }

    .animate-on-scroll {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    }

    .animate-on-scroll.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .hover-3d {
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      transform-style: preserve-3d;
    }

    .hover-3d:hover {
      transform: perspective(1000px) rotateX(5deg) rotateY(-5deg) translateZ(20px);
      box-shadow: 20px 20px 60px rgba(0,0,0,0.15), -5px -5px 20px rgba(201, 169, 98, 0.1);
